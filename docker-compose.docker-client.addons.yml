services:

    mender-client:
        # Needs to be built in extra/mender-client-docker-addons
        image: ${MENDER_CLIENT_REGISTRY}/${MENDER_CLIENT_REPOSITORY}/${MENDER_CLIENT_DOCKER_ADDONS_IMAGE}:${MENDER_CLIENT_DOCKER_ADDONS_TAG}
        # for iptables commands
        privileged: true
        networks:
            - mender
        blkio_config:
            weight: 100
        healthcheck:
            test: ["CMD-SHELL", "(exec 3<>/dev/tcp/127.0.0.1/22 && : <&3) 2>/dev/null"]
            interval: 5s
            timeout: 3s
            retries: 40
            start_period: 30s

networks:
    mender:
